{% extends "base_auth.html" %}
{% block title %}Login — Watchtower{% endblock %}
{% block content %}
<div class="form-title">Sign in</div>
<div class="form-sub">Monitor your infrastructure</div>
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label>Username</label>
    <input type="text" name="username" placeholder="your_username" required autofocus>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
</form>
<div class="auth-link">
  No account? <a href="{% url 'register' %}">Create one</a>
</div>
{% endblock %}
