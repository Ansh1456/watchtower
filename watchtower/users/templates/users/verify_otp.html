{% extends "base_auth.html" %}
{% block title %}Verify OTP — Watchtower{% endblock %}
{% block content %}
<div class="form-title">Verify identity</div>
<div class="form-sub">Enter the 6-digit code sent to your email</div>
<div class="otp-hint">
  ⚠ Demo mode — your OTP is shown in the message above
</div>
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label>One-Time Password</label>
    <input type="text" name="otp" maxlength="6" placeholder="——————"
           class="otp-input" required autofocus>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Verify OTP →</button>
</form>
<div class="auth-link">
  <a href="{% url 'login' %}">← Back to login</a>
</div>
{% endblock %}
